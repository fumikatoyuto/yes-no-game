<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特典コンテンツ - Yes/No Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.4);
            padding: 50px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #ffb88c;
            margin-bottom: 25px;
            font-size: 2.2rem;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎉 おめでとうございます！ 🎉</h1>
        <p>こんな難しいクイズを軽々クリアするなんて…！<br>文花には頭が上がらないぜ…<br>では、お待ちかねのプレゼントをどうぞ！</p>
        <a href="rewards.html" class="download-btn">特典コンテンツを受け取る</a>
    </div>
</body>

</html>
