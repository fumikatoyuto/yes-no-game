<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>絶対に答えがNoのゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-container">
        <h2 class="game-title">絶対に答えが<span id="title-no" class="secret-no">No</span>のゲーム</h2>
        <h1 id="question">第1問：キリンの首の骨の数は、スズメよりも多い？</h1>
        <div id="button-container" class="buttons">
            <button id="btn-yes" class="btn yes">Yes</button>
            <button id="btn-no" class="btn no">No</button>
        </div>
        <div id="explanation-container" class="explanation-container hidden">
            <!-- 差し込む画像のパス(src)をここに入力してください -->
            <img src="https://via.placeholder.com/100x100?text=Image" alt="キャラクター" class="character-img" id="character-img">
            <div class="speech-bubble">
                <p id="explanation-text"></p>
            </div>
        </div>
        <div id="message-container" class="hidden" style="display:flex; flex-direction:column; align-items:center; gap:20px;">
            <img src="https://via.placeholder.com/100x100?text=Mistake" alt="キャラクター" class="character-img" id="character-img-mistake">
            <h2 style="line-height:1.5; margin:0;">絶対にNoが答えって言ってるのに…<br>もう文花のお茶目さん♡</h2>
            <button id="btn-restart" class="btn restart">スタート画面に戻る</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
